<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Botbouch</title>
    <link rel="shortcut icon" type="image/gif" href="../favicon.ico">
    <link rel="stylesheet" href="chat.css">
</head>
<body>

<header>
    <a href="/" class="back">← babouch.fr</a>
    <span class="title">🐱 Botbouch</span>
    <a href="build_index.php" target="_blank" class="btn-index" title="Reconstruire l'index de recherche">⚙ Indexer</a>
</header>

<main id="messages">
    <!-- Message d'accueil -->
    <div class="message bot" id="welcome">
        <div class="avatar">🐱</div>
        <div class="bubble">
            <p>Miaou&nbsp;! Je suis Botbouch.</p>
            <p>Pose-moi une question sur le contenu du site…</p>
            <div class="suggestions">
                <button onclick="askSuggestion(this)">Qui était Marcel Gotrand ?</button>
                <button onclick="askSuggestion(this)">D'où viennent les Carlé ?</button>
                <button onclick="askSuggestion(this)">Qui sont les ancêtres de Barles ?</button>
                <button onclick="askSuggestion(this)">Quelles ont été les campagnes navales de Florian Carlé ?</button>
                <button onclick="askSuggestion(this)">Dans quels quartiers de Marseille ont vécu nos ancêtres ?</button>
                <button onclick="askSuggestion(this)">Qui sont les Massabo ?</button>
                <button onclick="askSuggestion(this)">Qui était le père des enfants de Rosine ?</button>
                <button onclick="askSuggestion(this)">Que s'est-il passé le 27 mai 1944 ?</button>
            </div>
        </div>
    </div>
</main>

<footer>
    <form id="chatform" onsubmit="sendMessage(event)">
        <input type="text" id="input" placeholder="Posez votre question…" autocomplete="off" autofocus>
        <button type="submit" id="sendbtn" title="Envoyer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </form>
</footer>

<script src="chat.js"></script>
</body>
</html>
